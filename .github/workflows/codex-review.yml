name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@codex review') &&
       github.event.comment.author_association != 'NONE')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Load PR context
        id: pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const prNumber = context.eventName === "pull_request"
              ? context.payload.pull_request.number
              : context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            return JSON.stringify({
              number: pr.number,
              title: pr.title,
              body: pr.body || "",
              mergeRef: `refs/pull/${pr.number}/merge`,
              baseSha: pr.base.sha,
              headSha: pr.head.sha,
            });
      - uses: actions/checkout@v5
        with:
          ref: ${{ fromJson(steps.pr.outputs.result).mergeRef }}
      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            You are reviewing PR #${{ fromJson(steps.pr.outputs.result).number }} in ${{ github.repository }}.

            Read and follow AGENTS.md. Review ONLY the changes introduced by this PR.
            Base SHA: ${{ fromJson(steps.pr.outputs.result).baseSha }}
            Head SHA: ${{ fromJson(steps.pr.outputs.result).headSha }}

            Use this structure:
            - Summary
            - Findings
            - Risks
            - Merge recommendation

            Pull request title:
            ${{ fromJson(steps.pr.outputs.result).title }}

            Pull request body:
            ${{ fromJson(steps.pr.outputs.result).body }}

      - name: Post review comment
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ fromJson(steps.pr.outputs.result).number }}"),
              body: process.env.CODEX_FINAL_MESSAGE,
            });
